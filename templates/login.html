<!DOCTYPE html>
<html>

<head>
    <div class="divi">
        <h1 class="title">Smart Resume Analyzer</h1>
    </div>

    <title>Login</title>

    <style>
        body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#2563eb,#7c3aed);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    width:400px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#040405;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.signup-link{
    text-align:center;
    margin-top:15px;
}

    </style>

</head>

<body>

<div class="box">

    <h1>Login</h1>

    <form id="loginForm">

        <input type="email"
               id="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               id="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="msg"></p>

    <hr>

    <p>Don't have an account?</p>

    <a href="/signuppage">

        <button>
            Signup
        </button>

    </a>

</div>


<script>

document.getElementById("loginForm").onsubmit =
async function(e){

    e.preventDefault()

    let response = await fetch("/login", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            email:
            document.getElementById("email").value,

            password:
            document.getElementById("password").value

        })

    })

    let data = await response.json()

    document.getElementById("msg").innerHTML =
    data.message


    if(data.message == "Login successful"){

        window.location.href = "/uploadpage"

    }

}

</script>

</body>
</html>

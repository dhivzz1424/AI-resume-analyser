<!DOCTYPE html>
<html>

<head>
    <h1 class="title">SMART RESUME ANALYZER</h1>

    <title>Signup</title>

    <style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    width:400px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    color:#090a0b;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

p{
    text-align:center;
}

a{
    text-decoration:none;
}

    </style>

</head>

<body>

<div class="box">

    <h1>Signup</h1>

    <form id="signupForm">

        <input type="email"
               id="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               id="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Signup
        </button>

    </form>

    <p id="msg"></p>

</div>


<script>

document.getElementById("signupForm").onsubmit =
async function(e){

    e.preventDefault()

    let response = await fetch("/signup", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            email:
            document.getElementById("email").value,

            password:
            document.getElementById("password").value

        })

    })

    let data = await response.json()

    document.getElementById("msg").innerHTML =
    data.message


    // MOVE TO LOGIN AFTER SIGNUP

    if(data.message == "User registered successfully"){

        window.location.href = "/"

    }

}

</script>

</body>
</html>

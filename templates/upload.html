<!DOCTYPE html>
<html>

<head>
    <div class="divi">
        <h1 class="title">Smart Resume Analyser</h1>
    </div>
    <title>Upload Resume</title>

    <style>

        body{
            font-family: Arial;
            background-color: lightgray;
            text-align: center;
        }

        .box{
            background-color: white;
            width: 500px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            border-radius: 10px;
        }

        button{
            padding: 10px;
            width: 90%;
            background-color: blue;
            color: white;
            border: none;
        }
        .resultBox{

            margin-top: 20px;

            text-align: left;

            background-color: #f5f5f5;

            padding: 15px;

            border-radius: 10px;

            word-wrap: break-word;

            white-space: pre-wrap;

}

    </style>

</head>

<body>

<div class="box">

    <h1>Upload Resume</h1>

    <form id="uploadForm">

        <input type="file"
               name="resume"
               required>

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

    <div id="result" class="resultBox"></div>

</div>



<script>

document.getElementById("uploadForm").onsubmit =
async function(e){

    e.preventDefault()

    let formData = new FormData(e.target)

    let response = await fetch("/upload", {

        method:"POST",

        body: formData

    })

    let data = await response.json()

    document.getElementById("result").innerHTML =

    "<h2>Resume Score: "
    + data.score +

    "</h2>" +

    "<br><b>Skills:</b> "
    + data.skills +

    "<br><br><b>Suggestions:</b><br>"
    + data.suggestions.join("<br>") +

    "<br><br><b>Resume Preview:</b><br><br>"
    + data.preview

}

</script>

</body>
</html>

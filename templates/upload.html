<!DOCTYPE html>
<html>

<head>
    <div class="divi">
        <h1 class="title">Smart Resume Analyser</h1>
    </div>
    <title>Upload Resume</title>

    <style>
        body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    min-height:100vh;
}

.title{
    text-align:center;
    color:white;
    padding:20px;
    margin:0;
    font-size:40px;
}

.box{
    width:700px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.box h1{
    text-align:center;
    color:#2563eb;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.card{
    background:#f8fafc;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
    color:#16a34a;
    text-align:center;
}

.card h3{
    color:#2563eb;
}

.preview{
    background:white;
    border:1px solid #ddd;
    padding:15px;
    border-radius:10px;
    max-height:300px;
    overflow-y:auto;
    white-space:pre-wrap;
}

.resultBox{
    margin-top:20px;
}

ul{
    padding-left:20px;
}

li{
    margin-bottom:8px;
}

    </style>

</head>

<body>

<div class="box">

    <h1>Upload Resume</h1>

    <form id="uploadForm">

        <input type="file"
               name="resume"
               required>

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

    <div id="result" class="resultBox"></div>

</div>



<script>

document.getElementById("uploadForm").onsubmit =
async function(e){

    e.preventDefault()

    let formData = new FormData(e.target)

    let response = await fetch("/upload", {

        method:"POST",

        body: formData

    })

    let data = await response.json()

    document.getElementById("result").innerHTML = `

    <div class="card">
    <h2>Resume Score: ${data.score}/100</h2>
    </div>

    <div class="card">
    <h3>Skills Found</h3>
    <p>${data.skills.join(", ")}</p>
    </div>

    <div class="card">
    <h3>Suggestions</h3>
    <ul>
    ${data.suggestions.map(
    item => `<li>${item}</li>`
    ).join("")}
    </ul>
    </div>

    <div class="card">
    <h3>Resume Preview</h3>
    <div class="preview">
    ${data.preview}
    </div>
    </div>

    `
}

</script>

</body>
</html>
